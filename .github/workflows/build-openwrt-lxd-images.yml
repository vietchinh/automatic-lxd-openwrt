name: build-openwrt-lxd-images
on:
  schedule:
    - cron: '0 0 * * 0'
  workflow_dispatch:
jobs:
  matrix-setup:
    runs-on: ubuntu-latest
    env:
      EXCLUDED_VERSIONS: "24.10.0-rc1 " #space seperated
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
    steps:
      - name: Checkout
        uses: actions/checkout@main
        with:
          fetch-depth: 0
      - id: set-matrix
        run: |
            declare -A excluded tags
            
            for version in $EXCLUDED_VERSIONS; do
                excluded["$version"]=1
            done
            
            while read -r tag; do
                tags["$tag"]=1
            done < <(git tag)
            
            json_versions=$(
            {
                curl -fsSL https://downloads.openwrt.org/releases/ |
                grep -Po '"\K\d+\.\d+\.\d+(?:-rc\d+)?(?=/")' |
                while read -r version; do
                    major=${version%%.*}
            
                    if (( major < 20 )); then
                        echo "Skipping unsupported version: $version" >&2
                        continue
                    fi
            
                    if [[ -n ${excluded[$version]} ]]; then
                        echo "Excluding version: $version" >&2
                        continue
                    fi
            
                    if [[ -n ${tags[$version]} ]]; then
                        echo "Tag already exists: $version" >&2
                        continue
                    fi
            
                    echo "New version found: $version" >&2
                    printf '%s\n' "$version"
                done
            } | jq -Rsc '{versions: split("\n")[:-1]}'
            )
            
            echo "$json_versions"
            echo "matrix=$json_versions" >> "$GITHUB_OUTPUT"

  build-openwrt-lxd-images:
    needs: matrix-setup
    runs-on: ubuntu-latest
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix: ${{fromJson(needs.matrix-setup.outputs.matrix)}}
    steps:
      - uses: awalsh128/cache-apt-pkgs-action@master
        with:
          packages: fakeroot
          version: 1.0
      # OpenWrt 25.12 switched from opkg to apk as the package manager.
      # mikma/lxd-openwrt's build_rootfs.sh was updated to match (commit 572872a),
      # which dropped support for building opkg-based (24.10.x and earlier) images.
      # Pick the right lxd-openwrt commit based on the OpenWrt version being built.
      - name: Determine compatible lxd-openwrt ref
        id: lxd_ref
        run: |
          ver="${{ matrix.version }}"
          major=${ver%%.*}
          
          if (( major >= 25 )); then
              echo "ref=master" >> "$GITHUB_OUTPUT"
          else
              echo "ref=28e0c7f0cb1e37d3762e219ac927b677d4e0def8" >> "$GITHUB_OUTPUT"
          fi

      - name: Checkout lxd-openwrt
        uses: actions/checkout@main
        with:
          repository: mikma/lxd-openwrt
          path: lxd-openwrt
          ref: ${{ steps.lxd_ref.outputs.ref }}

      - name: Apply rootfs-download fix
        working-directory: lxd-openwrt
        run: |
          cat << 'PATCH' | git apply -
          --- a/build.sh
          +++ b/build.sh
          @@ -122,7 +122,7 @@
           }
           
           download_rootfs() {
          -	detect_url "rootfs\.tar"
          +	detect_url "${ver}-${arch}-${subarch}-rootfs\.tar\.gz"
           	local rootfs_url=$openwrt_url/$return
           
           	# global $rootfs
          PATCH
      - name: Build openwrt LXD image
        working-directory: lxd-openwrt
        id: imagebuilder
        run: |
          ./build.sh -a x86_64 -v ${{ matrix.versions }}
          echo "IMAGE_PATH=bin/openwrt-${{ matrix.versions }}-x86-64-lxd.tar.gz" >> $GITHUB_OUTPUT
      - name: Upload openwrt LXD image
        working-directory: lxd-openwrt
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: gh release create ${{ matrix.versions }} ${{ steps.imagebuilder.outputs.IMAGE_PATH }} -t ${{ matrix.versions }} -R ${{ github.repository_owner }}/${{ github.event.repository.name }}
